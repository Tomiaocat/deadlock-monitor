<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - 死锁监控系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #2a2a4a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #ff6b6b;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .header p {
      color: #888;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #eee;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ff6b6b;
    }
    .password-requirements {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #888;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #ff5252;
    }
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .message {
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .message.error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    .message.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid #4caf50;
      color: #4caf50;
    }
    .message.visible {
      display: block;
    }
    .links {
      margin-top: 20px;
      text-align: center;
    }
    .links a {
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .links a:hover {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔑 重置密码</h1>
      <p>设置您的新密码</p>
    </div>

    <div class="message" id="message"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="form-group">
        <label for="new_password">新密码</label>
        <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="请输入新密码">
        <div class="password-requirements">至少 6 个字符</div>
      </div>

      <div class="form-group">
        <label for="confirm_password">确认密码</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="请再次输入新密码">
      </div>

      <button type="submit" class="btn" id="submitBtn">重置密码</button>
    </form>

    <div class="links">
      <a href="/login.html">返回登录</a>
    </div>
  </div>

  <script>
    // 从 URL 获取 token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showMessage('无效的重置链接：缺少 token', 'error');
      document.getElementById('resetForm').querySelector('button').disabled = true;
    }

    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.classList.add('visible', type);
    }

    function handleReset(event) {
      event.preventDefault();

      const newPassword = document.getElementById('new_password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      if (newPassword !== confirmPassword) {
        showMessage('两次输入的密码不一致', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showMessage('密码长度至少为 6 个字符', 'error');
        return;
      }

      resetPassword(newPassword);
    }

    async function resetPassword(newPassword) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '重置中...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '重置失败');
        }

        showMessage('密码重置成功！即将跳转到登录页面...', 'success');

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);

      } catch (err) {
        showMessage(err.message, 'error');
        btn.disabled = false;
        btn.textContent = '重置密码';
      }
    }
  </script>
</body>
</html>
