<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - 死锁监控系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #2a2a4a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #ff6b6b;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .header p {
      color: #888;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #eee;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ff6b6b;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #ff5252;
    }
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .message {
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .message.error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    .message.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid #4caf50;
      color: #4caf50;
    }
    .message.visible {
      display: block;
    }
    .links {
      margin-top: 20px;
      text-align: center;
    }
    .links a {
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .links a:hover {
      color: #ff6b6b;
    }
    .note {
      margin-top: 15px;
      padding: 12px;
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      border-radius: 6px;
      color: #ffc107;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔐 忘记密码</h1>
      <p>输入您的注册邮箱以重置密码</p>
    </div>

    <div class="message" id="message"></div>

    <form id="forgotForm" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label for="email">注册邮箱</label>
        <input type="email" id="email" name="email" required placeholder="请输入您的注册邮箱">
      </div>

      <button type="submit" class="btn" id="submitBtn">发送重置链接</button>
    </form>

    <div class="note" id="note" style="display: none;">
      <strong>提示：</strong>开发环境下重置令牌将显示在响应中。生产环境将发送邮件到注册邮箱。
    </div>

    <div class="links">
      <a href="/login.html">返回登录</a>
    </div>
  </div>

  <script>
    async function handleForgot(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const btn = document.getElementById('submitBtn');
      const message = document.getElementById('message');
      const note = document.getElementById('note');

      btn.disabled = true;
      btn.textContent = '发送中...';
      message.classList.remove('visible', 'error', 'success');

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '发送失败');
        }

        message.textContent = data.message || '如果邮箱存在，重置链接将发送到您的邮箱';
        message.classList.add('visible', 'success');
        note.style.display = 'block';

        // 开发环境显示 token（实际部署时应移除）
        if (data.reset_token) {
          note.innerHTML += `<br><br><strong>重置令牌（仅开发）:</strong><br><code>${data.reset_token}</code>`;
        }

        document.getElementById('forgotForm').reset();
      } catch (err) {
        message.textContent = err.message;
        message.classList.add('visible', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送重置链接';
      }
    }
  </script>
</body>
</html>
