<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>登录 - 死锁监控系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #2a2a4a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h1 {
      color: #ff6b6b;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .login-header p {
      color: #888;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #eee;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ff6b6b;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #ff6b6b;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #ff5252;
    }
    .btn:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .error-message {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 20px;
      color: #ff6b6b;
      font-size: 0.9rem;
      display: none;
    }
    .error-message.visible {
      display: block;
    }
    .links {
      margin-top: 20px;
      text-align: center;
    }
    .links a {
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .links a:hover {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔒 死锁监控系统</h1>
      <p>请登录以继续</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
      </div>

      <button type="submit" class="btn" id="loginBtn">登录</button>
    </form>

    <div class="links">
      <a href="/forgot-password.html">忘记密码？</a>
    </div>
  </div>

  <script>
    // 检查是否已登录
    async function checkAuth() {
      try {
        const token = localStorage.getItem('access_token');
        if (!token) {
          console.log('[Login] No token found, showing login page');
          return;
        }

        console.log('[Login] Token found, validating...');
        const res = await fetch('/api/auth/me', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (res.ok) {
          console.log('[Login] Token valid, redirecting to home');
          window.location.href = '/';
        } else {
          console.log('[Login] Token invalid, clearing and showing login');
          localStorage.removeItem('access_token');
          localStorage.removeItem('user');
        }
      } catch (err) {
        console.error('[Login] Auth check error:', err);
        // Token 无效，继续显示登录页
      }
    }

    console.log('[Login] Script loaded, waiting for DOM...');

    // 在 DOM 加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[Login] DOMContentLoaded fired');
      checkAuth();
      const usernameInput = document.getElementById('username');
      if (usernameInput) {
        console.log('[Login] Focusing username input');
        usernameInput.focus();
      } else {
        console.error('[Login] Username input not found!');
      }
    });

    async function handleLogin(event) {
      event.preventDefault();
      console.log('[Login] Login form submitted');

      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMessage');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorEl.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '登录失败');
        }

        // 保存 token
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // 跳转到首页
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }

    // 支持回车键登录
  </script>
</body>
</html>
